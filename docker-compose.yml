version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: test-platform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Rebort
      MYSQL_DATABASE: test_platform
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --max-connections=16384
    networks:
      - test-platform-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PostgreSQL数据库
  postgres:
    image: postgres:15
    container_name: test-platform-postgres
    environment:
      POSTGRES_DB: test_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - test-platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: test-platform-backend
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DB_TYPE=${DB_TYPE:-mysql}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Rebort}
      - DB_NAME=${DB_NAME:-test_platform}
      - AUTO_INIT_DB=${AUTO_INIT_DB:-true}
      - DISABLE_SSL_VERIFY=true
      - N_TESTER_MCP_URL=http://n-tester-mcp:8006/mcp
    ports:
      - "8018:8018"
      - "8019:8019"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
      - ./backend/browser_drivers:/app/browser_drivers
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      n-tester-mcp:
        condition: service_started
    networks:
      - test-platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8018/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: test-platform-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - test-platform-network
    restart: unless-stopped

  # N-Tester MCP 服务
  n-tester-mcp:
    build:
      context: ./N-Tester_MCP
      dockerfile: Dockerfile
    container_name: n-tester-mcp
    environment:
      - N_TESTER_HOST=0.0.0.0
      - N_TESTER_PORT=8006
      - N-Tester_API_KEY=N-Tester-default-mcp-key-2025
      - ENABLE_PLAYWRIGHT_INTEGRATION=false
      - PLAYWRIGHT_MODE=http
      - PLAYWRIGHT_HTTP_URL=http://playwright-mcp:3000
      - ENABLE_ENHANCED_TOOLS=true
      - ENABLE_NAVIGATION_HISTORY=true
      - TOOL_CALL_TIMEOUT=60
      - LOG_LEVEL=INFO
    ports:
      - "8006:8006"
    networks:
      - test-platform-network
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:

networks:
  test-platform-network:
    driver: bridge